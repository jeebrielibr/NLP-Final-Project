<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>YouTube Judol Comment Remover</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    /* ============================
       DESIGN TOKENS
    ============================ */
    :root {
      --clay-canvas: #F4F1FA;
      --clay-foreground: #332F3A;
      --clay-muted: #635F69;
      --clay-accent: #7C3AED;
      --clay-accent-light: #A78BFA;
      --clay-accent-alt: #DB2777;
      --clay-blue: #0EA5E9;
      --clay-green: #10B981;
      --clay-amber: #F59E0B;
      --clay-card-bg: rgba(255, 255, 255, 0.6);
      --clay-surface: #EFEBF5;
      --clay-inset-dark: #d9d4e3;

      /* Shadow Tokens */
      --shadow-clay-surface:
        30px 30px 60px #cdc6d9,
        -30px -30px 60px #ffffff,
        inset 10px 10px 20px rgba(139, 92, 246, 0.05),
        inset -10px -10px 20px rgba(255, 255, 255, 0.8);

      --shadow-clay-card:
        12px 12px 24px rgba(160, 150, 180, 0.2),
        -8px -8px 20px rgba(255, 255, 255, 0.9),
        inset 4px 4px 8px rgba(139, 92, 246, 0.03),
        inset -4px -4px 8px rgba(255, 255, 255, 1);

      --shadow-clay-button:
        8px 8px 16px rgba(139, 92, 246, 0.3),
        -6px -6px 12px rgba(255, 255, 255, 0.4),
        inset 3px 3px 6px rgba(255, 255, 255, 0.4),
        inset -3px -3px 6px rgba(0, 0, 0, 0.1);

      --shadow-clay-pressed:
        inset 6px 6px 12px #d9d4e3,
        inset -6px -6px 12px #ffffff;

      --shadow-clay-card-hover:
        16px 16px 32px rgba(139, 92, 246, 0.18),
        -10px -10px 24px rgba(255, 255, 255, 0.95),
        inset 5px 5px 10px rgba(139, 92, 246, 0.04),
        inset -5px -5px 10px rgba(255, 255, 255, 1);

      --shadow-clay-sm:
        4px 4px 8px rgba(160, 150, 180, 0.18),
        -3px -3px 6px rgba(255, 255, 255, 0.85),
        inset 2px 2px 4px rgba(139, 92, 246, 0.02),
        inset -2px -2px 4px rgba(255, 255, 255, 0.9);

      --shadow-clay-sm-hover:
        6px 6px 12px rgba(139, 92, 246, 0.15),
        -4px -4px 8px rgba(255, 255, 255, 0.95),
        inset 2px 2px 4px rgba(139, 92, 246, 0.03),
        inset -2px -2px 4px rgba(255, 255, 255, 1);
    }

    /* ============================
       RESET & BASE
    ============================ */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      color: var(--clay-foreground);
      background: var(--clay-canvas);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ============================
       ANIMATED BACKGROUND BLOBS
    ============================ */
    .bg-blobs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .bg-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
    }

    .bg-blob--violet {
      width: 200px;
      height: 200px;
      background: rgba(139, 92, 246, 0.12);
      top: -15%;
      left: -20%;
      animation: clay-float 8s ease-in-out infinite;
    }

    .bg-blob--pink {
      width: 180px;
      height: 180px;
      background: rgba(236, 72, 153, 0.1);
      top: 30%;
      right: -25%;
      animation: clay-float-delayed 10s ease-in-out infinite;
      animation-delay: 2s;
    }

    .bg-blob--blue {
      width: 160px;
      height: 160px;
      background: rgba(14, 165, 233, 0.1);
      bottom: -10%;
      left: 10%;
      animation: clay-float-slow 12s ease-in-out infinite;
      animation-delay: 4s;
    }

    @keyframes clay-float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(2deg); }
    }

    @keyframes clay-float-delayed {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-12px) rotate(-2deg); }
    }

    @keyframes clay-float-slow {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(3deg); }
    }

    @keyframes clay-breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.85); }
    }

    @media (prefers-reduced-motion: reduce) {
      .bg-blob,
      .stat-orb,
      .status-dot {
        animation: none !important;
      }
      .mode-option,
      .toggle-row,
      .stat-item {
        transition: none !important;
      }
    }

    /* ============================
       CONTAINER
    ============================ */
    .container {
      position: relative;
      z-index: 1;
      width: 360px;
      margin: 0 auto;
      padding: 24px 20px 20px;
      background: var(--clay-card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 32px;
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: var(--shadow-clay-card);
      min-height: 100vh;
    }

    /* ============================
       HEADER
    ============================ */
    header {
      text-align: center;
      margin-bottom: 24px;
    }

    header h1 {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 1.65rem;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--clay-foreground);
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 0.82rem;
      color: var(--clay-muted);
      font-weight: 500;
    }

    /* ============================
       SECTIONS
    ============================ */
    .section {
      margin-bottom: 20px;
    }

    .section h2 {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 0.88rem;
      color: var(--clay-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }

    /* ============================
       TOGGLE SWITCH (Clay Pill)
    ============================ */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      background: var(--clay-surface);
      border-radius: 20px;
      box-shadow: var(--shadow-clay-pressed);
      cursor: pointer;
      transition: all 0.3s ease;
      user-select: none;
    }

    .toggle-row:active {
      transform: scale(0.98);
    }

    .toggle-row label {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--clay-foreground);
      cursor: pointer;
    }

    /* Hide the native checkbox */
    .toggle-switch {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
      pointer-events: none;
    }

    /* Custom toggle track */
    .toggle-row {
      position: relative;
    }

    .toggle-track {
      position: relative;
      width: 52px;
      height: 30px;
      flex-shrink: 0;
      border-radius: 15px;
      background: #d9d4e3;
      box-shadow: var(--shadow-clay-pressed);
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .toggle-track::after {
      content: '';
      position: absolute;
      top: 4px;
      left: 4px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e0dce6, #c5bfcf);
      box-shadow:
        3px 3px 6px rgba(160, 150, 180, 0.3),
        -2px -2px 4px rgba(255, 255, 255, 0.8),
        inset 1px 1px 2px rgba(255, 255, 255, 0.5),
        inset -1px -1px 2px rgba(0, 0, 0, 0.08);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* Active toggle state */
    .toggle-switch:checked ~ .toggle-track {
      background: linear-gradient(135deg, var(--clay-accent-light), var(--clay-accent));
      box-shadow:
        4px 4px 10px rgba(124, 58, 237, 0.35),
        -3px -3px 6px rgba(255, 255, 255, 0.2),
        inset 2px 2px 4px rgba(255, 255, 255, 0.25),
        inset -2px -2px 4px rgba(0, 0, 0, 0.15);
    }

    .toggle-switch:checked ~ .toggle-track::after {
      transform: translateX(22px);
      background: linear-gradient(135deg, #ffffff, #f0ecf7);
      box-shadow:
        3px 3px 8px rgba(124, 58, 237, 0.3),
        -2px -2px 4px rgba(255, 255, 255, 0.6),
        inset 1px 1px 2px rgba(255, 255, 255, 0.8),
        inset -1px -1px 2px rgba(0, 0, 0, 0.05);
    }

    .toggle-switch:focus-visible ~ .toggle-track {
      outline: 3px solid var(--clay-accent-light);
      outline-offset: 2px;
    }

    /* ============================
       MODE SELECTION (Clay Cards)
    ============================ */
    .mode-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .mode-option {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 16px;
      background: var(--clay-card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 20px;
      border: 2px solid transparent;
      box-shadow: var(--shadow-clay-sm);
      cursor: pointer;
      transition: all 0.35s ease;
      position: relative;
      overflow: hidden;
    }

    .mode-option:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-clay-sm-hover);
    }

    .mode-option:active {
      transform: scale(0.97);
      box-shadow: var(--shadow-clay-pressed);
    }

    /* Hide native radio */
    .mode-option input[type="radio"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
      pointer-events: none;
    }

    /* Selected state */
    .mode-option:has(input:checked) {
      border-color: var(--clay-accent);
      background: rgba(167, 139, 250, 0.08);
      box-shadow:
        8px 8px 16px rgba(139, 92, 246, 0.15),
        -6px -6px 12px rgba(255, 255, 255, 0.85),
        inset 3px 3px 6px rgba(139, 92, 246, 0.06),
        inset -3px -3px 6px rgba(255, 255, 255, 0.9);
    }

    .mode-option input:focus-visible ~ .mode-label {
      outline: 3px solid var(--clay-accent-light);
      outline-offset: 2px;
      border-radius: 12px;
    }

    .mode-label {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--clay-foreground);
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .mode-icon {
      font-size: 1.1rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 10px;
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.12), rgba(139, 92, 246, 0.04));
      box-shadow: var(--shadow-clay-pressed);
      flex-shrink: 0;
    }

    .mode-desc {
      font-size: 0.78rem;
      color: var(--clay-muted);
      font-weight: 500;
      line-height: 1.45;
      display: block;
      margin-top: 2px;
    }

    .mode-option:has(input:checked) .mode-icon {
      background: linear-gradient(135deg, var(--clay-accent-light), var(--clay-accent));
      box-shadow: var(--shadow-clay-button);
    }

    .mode-option:has(input:checked) .mode-icon span {
      filter: brightness(10);
    }

    /* Custom radio indicator dot */
    .mode-option::before {
      content: '';
      position: absolute;
      top: 16px;
      right: 16px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--clay-surface);
      box-shadow: var(--shadow-clay-pressed);
      flex-shrink: 0;
      transition: all 0.3s ease;
    }

    .mode-option::after {
      content: '';
      position: absolute;
      top: 20px;
      right: 20px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: transparent;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .mode-option:has(input:checked)::after {
      background: linear-gradient(135deg, var(--clay-accent-light), var(--clay-accent));
      box-shadow: 0 0 6px rgba(124, 58, 237, 0.4);
    }

    /* ============================
       THRESHOLD SLIDER
    ============================ */
    .threshold-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 18px;
      background: var(--clay-surface);
      border-radius: 20px;
      box-shadow: var(--shadow-clay-pressed);
    }

    /* Custom range slider */
    .threshold-row input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 8px;
      border-radius: 4px;
      background: linear-gradient(to right, var(--clay-accent) 0%, var(--clay-accent) 40%, #d9d4e3 40%, #d9d4e3 100%);
      outline: none;
      cursor: pointer;
      box-shadow: inset 2px 2px 4px rgba(0, 0, 0, 0.06),
                  inset -1px -1px 2px rgba(255, 255, 255, 0.5);
    }

    .threshold-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ffffff, #f0ecf7);
      border: none;
      cursor: pointer;
      box-shadow:
        4px 4px 10px rgba(139, 92, 246, 0.35),
        -3px -3px 6px rgba(255, 255, 255, 0.7),
        inset 2px 2px 3px rgba(255, 255, 255, 0.8),
        inset -2px -2px 3px rgba(0, 0, 0, 0.08);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .threshold-row input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
      box-shadow:
        5px 5px 12px rgba(139, 92, 246, 0.4),
        -3px -3px 8px rgba(255, 255, 255, 0.8),
        inset 2px 2px 3px rgba(255, 255, 255, 0.9),
        inset -2px -2px 3px rgba(0, 0, 0, 0.06);
    }

    .threshold-row input[type="range"]::-webkit-slider-thumb:active {
      transform: scale(0.92);
      box-shadow: var(--shadow-clay-pressed);
    }

    .threshold-row input[type="range"]::-moz-range-thumb {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ffffff, #f0ecf7);
      border: none;
      cursor: pointer;
      box-shadow:
        4px 4px 10px rgba(139, 92, 246, 0.35),
        -3px -3px 6px rgba(255, 255, 255, 0.7),
        inset 2px 2px 3px rgba(255, 255, 255, 0.8),
        inset -2px -2px 3px rgba(0, 0, 0, 0.08);
    }

    .threshold-row input[type="range"]:focus-visible {
      outline: 3px solid var(--clay-accent-light);
      outline-offset: 3px;
      border-radius: 8px;
    }

    #threshold-value {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 1.05rem;
      color: var(--clay-accent);
      min-width: 38px;
      text-align: center;
      padding: 4px 8px;
      background: rgba(167, 139, 250, 0.1);
      border-radius: 10px;
    }

    .threshold-hint {
      font-size: 0.75rem;
      color: var(--clay-muted);
      margin-top: 8px;
      padding-left: 4px;
      line-height: 1.5;
    }

    /* ============================
       API STATUS
    ============================ */
    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: var(--clay-card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 16px;
      box-shadow: var(--shadow-clay-sm);
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--clay-muted);
    }

    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--clay-amber);
      box-shadow:
        2px 2px 4px rgba(245, 158, 11, 0.3),
        -1px -1px 3px rgba(255, 255, 255, 0.6),
        inset 1px 1px 2px rgba(255, 255, 255, 0.4),
        inset -1px -1px 2px rgba(0, 0, 0, 0.1);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    .status-dot.online {
      background: var(--clay-green);
      box-shadow:
        2px 2px 4px rgba(16, 185, 129, 0.3),
        -1px -1px 3px rgba(255, 255, 255, 0.6),
        inset 1px 1px 2px rgba(255, 255, 255, 0.5),
        inset -1px -1px 2px rgba(0, 0, 0, 0.08);
      animation: none;
    }

    .status-dot.offline {
      background: #EF4444;
      box-shadow:
        2px 2px 4px rgba(239, 68, 68, 0.3),
        -1px -1px 3px rgba(255, 255, 255, 0.6),
        inset 1px 1px 2px rgba(255, 255, 255, 0.3),
        inset -1px -1px 2px rgba(0, 0, 0, 0.15);
      animation: none;
    }

    /* ============================
       STATISTICS (Clay Orbs)
    ============================ */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 20px 12px;
      background: var(--clay-card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 24px;
      box-shadow: var(--shadow-clay-sm);
      transition: all 0.4s ease;
    }

    .stat-item:hover {
      transform: translateY(-3px) scale(1.04);
      box-shadow: var(--shadow-clay-sm-hover);
    }

    .stat-orb {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      animation: clay-breathe 6s ease-in-out infinite;
    }

    .stat-item:first-child .stat-orb {
      background: linear-gradient(135deg, #fca5a5, #ef4444);
      box-shadow:
        6px 6px 14px rgba(239, 68, 68, 0.3),
        -4px -4px 10px rgba(255, 255, 255, 0.5),
        inset 3px 3px 6px rgba(255, 255, 255, 0.35),
        inset -3px -3px 6px rgba(0, 0, 0, 0.12);
    }

    .stat-item:last-child .stat-orb {
      background: linear-gradient(135deg, #93c5fd, #3b82f6);
      box-shadow:
        6px 6px 14px rgba(59, 130, 246, 0.3),
        -4px -4px 10px rgba(255, 255, 255, 0.5),
        inset 3px 3px 6px rgba(255, 255, 255, 0.35),
        inset -3px -3px 6px rgba(0, 0, 0, 0.12);
    }

    .stat-number {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 1.6rem;
      color: #ffffff;
      line-height: 1;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
    }

    .stat-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--clay-muted);
      text-align: center;
      line-height: 1.3;
      letter-spacing: 0.02em;
    }

    /* ============================
       FOOTER
    ============================ */
    footer {
      text-align: center;
      margin-top: 8px;
      padding-top: 16px;
      border-top: 1px solid rgba(139, 92, 246, 0.08);
    }

    .version {
      font-size: 0.7rem;
      color: var(--clay-muted);
      font-weight: 500;
      letter-spacing: 0.03em;
    }

    /* ============================
       SCROLLBAR (if content overflows)
    ============================ */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(139, 92, 246, 0.2);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(139, 92, 246, 0.35);
    }
  </style>
</head>
<body>

  <!-- Animated Background Blobs -->
  <div class="bg-blobs" aria-hidden="true">
    <div class="bg-blob bg-blob--violet"></div>
    <div class="bg-blob bg-blob--pink"></div>
    <div class="bg-blob bg-blob--blue"></div>
  </div>

  <div class="container">
    <header>
      <h1>Judol Remover</h1>
      <p class="subtitle">Deteksi komentar judi online di YouTube</p>
    </header>

    <!-- Master enable/disable -->
    <section class="section">
      <div class="toggle-row">
        <label for="enabled">Aktifkan Ekstensi</label>
        <input type="checkbox" id="enabled" class="toggle-switch">
        <span class="toggle-track" aria-hidden="true"></span>
      </div>
    </section>

    <!-- Mode selection -->
    <section class="section">
      <h2>Mode Tampilan</h2>
      <div class="mode-group">
        <label class="mode-option">
          <input type="radio" name="mode" value="highlight" id="mode-highlight">
          <div>
            <span class="mode-label">
              <span class="mode-icon"><span>🔍</span></span> Highlight
            </span>
            <span class="mode-desc">Tandai komentar judol dengan border + label</span>
          </div>
        </label>
        <label class="mode-option">
          <input type="radio" name="mode" value="hide" id="mode-hide">
          <div>
            <span class="mode-label">
              <span class="mode-icon"><span>👁️‍🗨️</span></span> Hide
            </span>
            <span class="mode-desc">Sembunyikan komentar judol sepenuhnya</span>
          </div>
        </label>
      </div>
    </section>

    <!-- Threshold -->
    <section class="section">
      <h2>Confidence Threshold</h2>
      <div class="threshold-row">
        <input type="range" id="threshold" min="0.50" max="0.95" step="0.05" value="0.70">
        <span id="threshold-value">0.70</span>
      </div>
      <p class="threshold-hint">Semakin tinggi = hanya prediksi yang lebih pasti ditandai</p>
    </section>

    <!-- API Status -->
    <section class="section">
      <div class="status-row">
        <span class="status-dot" id="api-status-dot"></span>
        <span id="api-status-text">Memeriksa API...</span>
      </div>
    </section>

    <!-- Session Stats -->
    <section class="section stats">
      <h2>Statistik Sesi</h2>
      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-orb">
            <span class="stat-number" id="judol-count">0</span>
          </div>
          <span class="stat-label">Judol Terdeteksi</span>
        </div>
        <div class="stat-item">
          <div class="stat-orb">
            <span class="stat-number" id="total-count">0</span>
          </div>
          <span class="stat-label">Total Diperiksa</span>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer>
      <p class="version">v1.0.0 · Kelompok Newton · NLP Final Project</p>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
